name: Update sing-box
on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".github/workflows/delete-old-workflows.yml"
      - ".github/workflows/update-adguardhome.yml"
      - ".github/workflows/update-dashboard.yml"
      - ".github/workflows/update-mihomo.yml"

permissions:
  contents: write

jobs:
  go:
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.go.outputs.version }}
    steps:
      - name: Get `Go` latest version
        id: go
        run: |
          echo "version=$(curl -sSL https://raw.githubusercontent.com/actions/go-versions/update-versions-manifest-file/versions-manifest.json | jq -r '.[0].version')" >> $GITHUB_OUTPUT

  ref1nd_stable_version:
    runs-on: ubuntu-latest
    outputs:
      ref1nd_stable_version: ${{ steps.version.outputs.ref1nd_stable_version }}
      ref1nd_stable_time: ${{ steps.version.outputs.ref1nd_stable_time }}
      ref1nd_stable_tags: ${{ steps.version.outputs.ref1nd_stable_tags }}
      ref1nd_stable_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable
          fetch-depth: 0

      - name: Get `sing-box reF1nd-Stable` version
        id: version
        run: |
          echo "ref1nd_stable_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/tags | jq -r '.[] | select(.name | contains("reF1nd") and (contains("alpha") | not)) | .name' | head -n 1 | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "ref1nd_stable_time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/commits/$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/tags | jq -r '.[] | select(.name | contains("reF1nd") and (contains("alpha") | not)) | .name' | head -n 1) | jq -r '.commit.committer.date' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "ref1nd_stable_tags=with_gvisor,with_quic,with_dhcp,with_utls,with_clash_api,with_wireguard,with_tailscale" >> $GITHUB_OUTPUT

      - name: Compare `sing-box reF1nd-Stable` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box reF1nd-Stable|${{ steps.version.outputs.ref1nd_stable_version }}|${{ steps.version.outputs.ref1nd_stable_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  ref1nd_stable_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1, variant: musl }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3, variant: musl }
          - { name: linux-armv5, goos: linux, goarch: arm, goarm: 5 }
          - { name: linux-armv6, goos: linux, goarch: arm, goarm: 6 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7, variant: musl }
          - { name: linux-arm64, goos: linux, goarch: arm64, variant: musl }
          - { name: linux-mips-softfloat, goos: linux, goarch: mips, gomips: softfloat }
          - { name: linux-mipsle-softfloat, goos: linux, goarch: mipsle, gomips: softfloat }
          - { name: linux-mipsle-hardfloat, goos: linux, goarch: mipsle, gomips: hardfloat }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - ref1nd_stable_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      ref1nd_stable_VERSION: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_version }}
      ref1nd_stable_TAGS: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_tags }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box reF1nd-Stable` core
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_stable_VERSION}' -s -w -buildid=" -tags "${ref1nd_stable_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-ref1nd-stable-${{ matrix.name }}
          path: sing-box*

  ref1nd_test_version:
    runs-on: ubuntu-latest
    outputs:
      ref1nd_test_version: ${{ steps.version.outputs.ref1nd_test_version }}
      ref1nd_test_time: ${{ steps.version.outputs.ref1nd_test_time }}
      ref1nd_test_tags: ${{ steps.version.outputs.ref1nd_test_tags }}
      ref1nd_test_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-testing
          fetch-depth: 0

      - name: Get `sing-box reF1nd-Test` version
        id: version
        run: |
          echo "ref1nd_test_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/tags | jq -r '.[] | select(.name | contains("reF1nd") and (test("alpha|beta|rc"))) | .name' | head -n 1 | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "ref1nd_test_time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/commits/$(curl -sSL https://api.github.com/repos/reF1nd/sing-box/tags | jq -r '.[] | select(.name | contains("reF1nd") and (test("alpha|beta|rc"))) | .name' | head -n 1) | jq -r '.commit.committer.date' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "ref1nd_test_tags=with_gvisor,with_quic,with_dhcp,with_utls,with_clash_api,with_wireguard,with_tailscale" >> $GITHUB_OUTPUT

      - name: Compare `sing-box reF1nd-Test` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box reF1nd-Test|${{ steps.version.outputs.ref1nd_test_version }}|${{ steps.version.outputs.ref1nd_test_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  ref1nd_test_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1, variant: musl }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3, variant: musl }
          - { name: linux-armv5, goos: linux, goarch: arm, goarm: 5 }
          - { name: linux-armv6, goos: linux, goarch: arm, goarm: 6 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7, variant: musl }
          - { name: linux-arm64, goos: linux, goarch: arm64, variant: musl }
          - { name: linux-mips-softfloat, goos: linux, goarch: mips, gomips: softfloat }
          - { name: linux-mipsle-softfloat, goos: linux, goarch: mipsle, gomips: softfloat }
          - { name: linux-mipsle-hardfloat, goos: linux, goarch: mipsle, gomips: hardfloat }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - ref1nd_test_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      ref1nd_test_VERSION: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_version }}
      ref1nd_test_TAGS: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_tags }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-testing

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box reF1nd-Test` core
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_test_VERSION}' -s -w -buildid=" -tags "${ref1nd_test_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v6
        with:
          name: sing-box-ref1nd-test-${{ matrix.name }}
          path: sing-box*

  ref1nd_stable_android:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_skip_update != 'true' }}
    needs:
      - ref1nd_stable_version
    env:
      ref1nd_stable_VERSION: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_version }}
      ref1nd_stable_TAGS: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_tags }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable
          path: sing-box
          fetch-depth: 0

      - name: Checkout `reF1nd/sing-box-for-android`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box-for-android
          ref: reF1nd-stable
          path: sing-box-for-android

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28

      - name: Setup OpenJDK
        run: |-
          sudo apt update && sudo apt install -y openjdk-17-jdk-headless
          /usr/lib/jvm/java-17-openjdk-amd64/bin/java --version

      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: ~/.gradle
          key: gradle-${{ hashFiles('**/*.gradle') }}

      - name: Decode Keystore
        run: |-
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ./sing-box-for-android/app/release.keystore

      - name: Streamline "Update" module
        run: |-
          echo "" | base64 -d > ./streamline-update.patch
          git apply ./streamline-update.patch

      - name: Compute build tags
        id: tags
        run: |-
          echo "sfa_tags=ts_omit_logtail,ts_omit_ssh,ts_omit_drive,ts_omit_taildrop,ts_omit_webclient,ts_omit_doctor,ts_omit_capture,ts_omit_kube,ts_omit_aws,ts_omit_synology,ts_omit_bird" >> "$GITHUB_OUTPUT"
          ref1nd_stable_sfa_TAGS="${{ env.ref1nd_stable_TAGS }},${sfa_tags}"
          echo "ref1nd_stable_sfa_TAGS=${ref1nd_stable_sfa_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build library
        run: |-
          cd ./sing-box/
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          gomobile bind -v \
            -o libbox.aar \
            -target android \
            -androidapi 23 \
            -javapkg=io.nekohasekai \
            -libname=box \
            -trimpath \
            -buildvcs=false \
            -tags="${{ steps.tags.outputs.ref1nd_stable_sfa_TAGS }}" \
            -ldflags="-X github.com/sagernet/sing-box/constant.Version=${{ env.ref1nd_stable_VERSION }} -X internal/godebug.defaultGODEBUG=multipathtcp=0 -s -w -buildid= -checklinkname=0" \
            ./experimental/libbox/
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Prepare Android client
        run: |-
          mkdir -p ./sing-box-for-android/app/libs/
          cp -f ./sing-box/*.aar ./sing-box-for-android/app/libs/

      - name: Build `SFA-reF1nd-Stable` apk
        run: |-
          cd ./sing-box-for-android/
          chmod +x gradlew
          ./gradlew :app:assembleOtherRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ALIAS_NAME }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ALIAS_PASS }}"
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Rename apks
        run: |-
          mkdir -p ./sfa-ref1nd-stable/
          for file in ./sing-box-for-android/app/build/outputs/apk/other/release/*.apk; do
            newname=$(basename "$file" | sed -E 's/^SFA-.*-reF1nd(\.[0-9]+)?/SFA-ref1nd-stable/')
            mv -f "${file}" "./sfa-ref1nd-stable/${newname}"
          done

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sfa-ref1nd-stable-apks
          path: ./sfa-ref1nd-stable/*

  ref1nd_test_android:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_skip_update != 'true' }}
    needs:
      - ref1nd_test_version
    env:
      ref1nd_test_VERSION: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_version }}
      ref1nd_test_TAGS: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_tags }}
    steps:
      - name: Checkout `reF1nd/sing-box`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-testing
          path: sing-box
          fetch-depth: 0

      - name: Checkout `reF1nd/sing-box-for-android`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box-for-android
          ref: reF1nd-testing
          path: sing-box-for-android

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28

      - name: Setup OpenJDK
        run: |-
          sudo apt update && sudo apt install -y openjdk-17-jdk-headless
          /usr/lib/jvm/java-17-openjdk-amd64/bin/java --version

      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: ~/.gradle
          key: gradle-${{ hashFiles('**/*.gradle') }}

      - name: Decode Keystore
        run: |-
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ./sing-box-for-android/app/release.keystore

      - name: Streamline "Update" module
        run: |-
          echo "" | base64 -d > ./streamline-update.patch
          git apply ./streamline-update.patch

      - name: Compute build tags
        id: tags
        run: |-
          echo "sfa_tags=ts_omit_logtail,ts_omit_ssh,ts_omit_drive,ts_omit_taildrop,ts_omit_webclient,ts_omit_doctor,ts_omit_capture,ts_omit_kube,ts_omit_aws,ts_omit_synology,ts_omit_bird" >> "$GITHUB_OUTPUT"
          ref1nd_test_sfa_TAGS="${{ env.ref1nd_test_TAGS }},${sfa_tags}"
          echo "ref1nd_test_sfa_TAGS=${ref1nd_test_sfa_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build library
        run: |-
          cd ./sing-box/
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          gomobile bind -v \
            -o libbox.aar \
            -target android \
            -androidapi 23 \
            -javapkg=io.nekohasekai \
            -libname=box \
            -trimpath \
            -buildvcs=false \
            -tags="${{ steps.tags.outputs.ref1nd_test_sfa_TAGS }}" \
            -ldflags="-X github.com/sagernet/sing-box/constant.Version=${{ env.ref1nd_test_VERSION }} -X internal/godebug.defaultGODEBUG=multipathtcp=0 -s -w -buildid= -checklinkname=0" \
            ./experimental/libbox/
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Prepare Android client
        run: |-
          mkdir -p ./sing-box-for-android/app/libs/
          cp -f ./sing-box/*.aar ./sing-box-for-android/app/libs/

      - name: Build `SFA-reF1nd-Test` apk
        run: |-
          cd ./sing-box-for-android/
          chmod +x gradlew
          ./gradlew :app:assembleOtherRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ALIAS_NAME }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ALIAS_PASS }}"
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Rename apks
        run: |-
          mkdir -p ./sfa-ref1nd-test/
          for file in ./sing-box-for-android/app/build/outputs/apk/other/release/*.apk; do
            newname=$(basename "$file" | sed -E 's/^SFA-.*-reF1nd(\.[0-9]+)?/SFA-ref1nd-test/')
            mv -f "${file}" "./sfa-ref1nd-test/${newname}"
          done

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sfa-ref1nd-test-apks
          path: ./sfa-ref1nd-test/*

  singbox_stable_version:
    runs-on: ubuntu-latest
    outputs:
      singbox_stable_version: ${{ steps.version.outputs.singbox_stable_version }}
      singbox_stable_time: ${{ steps.version.outputs.singbox_stable_time }}
      singbox_stable_tags: ${{ steps.version.outputs.singbox_stable_tags }}
      singbox_stable_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `SagerNet/sing-box`
        uses: actions/checkout@v6
        with:
