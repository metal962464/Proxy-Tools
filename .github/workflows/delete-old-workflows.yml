name: Delete old workflows
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  actions: write

jobs:
  del_old_runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
